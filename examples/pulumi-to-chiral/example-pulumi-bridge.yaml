# Example Pulumi Bridge Configuration
# Generated by Chiral for gradual migration from Pulumi to native cloud state

name: aws-project
runtime: nodejs
description: Chiral Infrastructure Configuration

# Backend configuration
backend:
  url: cloudformation
  options:
    region: var.aws_region
    # State delegation enabled
    # State will be managed by cloud provider
    # No more Pulumi state corruption, lock contention, or backend management

# Variables
variables:
  project_name:
    description: Project name for resource naming
    type: string
    default: identity-platform
  environment:
    description: Environment tier
    type: string
    default: prod
  region:
    description: Cloud provider region
    type: string
    default: us-east-1
  instance_type:
    description: EC2 instance type for nodes
    type: string
    default: t3.medium

# Resources with state delegation
resources:
  # EKS cluster managed by CloudFormation (no Pulumi state)
  eks_cluster:
    type: aws:cloudformation:Stack
    properties:
      template: file("pulumi-templates/eks-template.json")
      parameters:
        ClusterName: ${project_name}
        NodeInstanceType: ${instance_type}
        MinNodes: 2
        MaxNodes: 5
    # CloudFormation handles state internally
    # No more Pulumi state corruption, lock contention, or backend management

  # RDS database managed by CloudFormation (no Pulumi state)
  rds_database:
    type: aws:cloudformation:Stack
    properties:
      template: file("pulumi-templates/rds-template.json")
      parameters:
        DatabaseName: ${project_name}-postgres
        InstanceClass: db.t3.medium
        StorageGB: 100
    # CloudFormation handles state internally
    # No more Pulumi state corruption, lock contention, or backend management

  # Traditional VPC (kept for comparison during migration)
  legacy_vpc:
    type: aws:ec2:Vpc
    properties:
      cidrBlock: 10.0.0.0/16
      enableDnsHostnames: true
      enableDnsSupport: true
      tags:
        Name: ${project_name}-legacy
        Migration: "true"

# Output
outputs:
  pulumi_bridge_note:
    description: Pulumi Bridge: State delegated to CloudFormation
    value: Traditional Pulumi state issues eliminated by using CloudFormation-managed resources
